name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build debug APKs
        run: ./gradlew :shared:test assembleDebug

      - name: Collect APKs
        run: |
          mkdir -p release
          cp phone/build/outputs/apk/debug/phone-debug.apk release/remote-dialer-phone.apk
          cp tablet/build/outputs/apk/debug/tablet-debug.apk release/remote-dialer-tablet.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: release/*.apk

      # Only on a version tag (git tag v0.1 && git push origin v0.1):
      # create a GitHub Release and attach both APKs.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
